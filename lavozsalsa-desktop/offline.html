<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>La Voz Salsa - Sin conexión</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --surface: rgba(20, 20, 20, 0.88);
        --line: rgba(255, 255, 255, 0.12);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.74);
        --brand: #ff101f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(255, 16, 31, 0.16), transparent 24%),
          linear-gradient(180deg, #050505 0%, #0b0b0b 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.4);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--brand);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.8rem;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3.4rem);
        line-height: 0.96;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 1.02rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .primary {
        background: var(--brand);
        color: white;
      }

      .secondary {
        border: 1px solid var(--line);
        color: white;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">La Voz Salsa Desktop</p>
      <h1>La app necesita conexión</h1>
      <p>
        Radio, TV, login y chat se cargan desde el sitio en vivo. Revisa tu conexión a internet
        y vuelve a abrir la app cuando tengas red.
      </p>
      <div class="actions">
        <a class="primary" href="https://app.lavozsalsa.com/">Abrir en navegador</a>
        <a class="secondary" href="https://tv.lavozsalsa.com/">Ir a TV</a>
      </div>
    </main>
  </body>
</html>
