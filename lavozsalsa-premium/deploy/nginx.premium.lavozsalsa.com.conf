server {
    server_name premium.lavozsalsa.com;

    root /var/www/lavozsalsa-premium;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /index.html {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location /_expo/static/ {
        root /var/www/lavozsalsa-premium;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /brand/ {
        root /var/www/lavozsalsa-premium;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /fonts/ {
        root /var/www/lavozsalsa-premium;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        root /var/www/lavozsalsa-premium;
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /favicon.png { try_files $uri =404; }
    location = /apple-touch-icon.png { try_files $uri =404; }
    location = /site.webmanifest { try_files $uri =404; }
    location = /social-preview.svg { try_files $uri =404; }
    location = /robots.txt { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }
    location = /404.html { try_files $uri =404; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/premium.lavozsalsa.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/premium.lavozsalsa.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = premium.lavozsalsa.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name premium.lavozsalsa.com;
    return 404; # managed by Certbot
}
