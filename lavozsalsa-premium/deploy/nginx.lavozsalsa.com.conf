server {
    listen 80;
    server_name www.lavozsalsa.com;

    return 301 http://lavozsalsa.com$request_uri;
}

server {
    listen 80;
    server_name lavozsalsa.com;

    root /var/www/lavozsalsa-web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /_expo/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
    }

