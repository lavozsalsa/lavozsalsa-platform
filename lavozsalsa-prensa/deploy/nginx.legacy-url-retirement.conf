# Residuo WordPress y endpoints sin valor de migracion.
# Se responden como 410 Gone para cerrar URLs sin reemplazo real.

location = /feed {
    return 410;
}

location = /sitemap_index.xml {
    return 410;
}

location ~* ^/.+-sitemap([0-9]+)?\.xml$ {
    return 410;
}

location = /comments/feed/ {
    return 410;
}

location ~* /feed/?$ {
    return 410;
}

location ^~ /tag/ {
    return 410;
}

location ^~ /category/ {
    return 410;
}

location ^~ /author/ {
    return 410;
}

location = /xmlrpc.php {
    return 410;
}

location = /wp-links-opml.php {
    return 410;
}

location = /wp-trackback.php {
    return 410;
}

location = /readme.html {
    return 410;
}

location = /license.txt {
    return 410;
}
