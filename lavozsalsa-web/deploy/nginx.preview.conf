server {
    listen 80;
    server_name _;

    root /var/www/lavozsalsa-web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /_expo/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
