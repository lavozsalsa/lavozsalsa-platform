server {
    listen 80;
    server_name www.lavozsalsa.com;

    return 301 http://lavozsalsa.com$uri;
}

server {
    listen 80;
    server_name lavozsalsa.com;

    root /var/www/lavozsalsa-web/dist;
    index index.html;

    include /etc/nginx/snippets/lavozsalsa-brand-routes.conf;

    location / {
        if ($query_string != "") {
            return 301 http://lavozsalsa.com$uri;
        }

        try_files $uri $uri/ /index.html;
    }

    location /_expo/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
