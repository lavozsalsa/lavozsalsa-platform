server {
    listen 80;
    server_name www.lavozsalsa.com;

    return 301 http://lavozsalsa.com$uri;
}

server {
    listen 80;
    server_name lavozsalsa.com;

    root /var/www/lavozsalsa-web/dist;
    index index.html;

    include /etc/nginx/snippets/lavozsalsa-brand-routes.conf;

    location = /api/nowplaying.json {
        proxy_pass https://emisora.lavozsalsa.com/api/nowplaying_static/lavozsalsa.json;
        proxy_ssl_server_name on;
        proxy_set_header Host emisora.lavozsalsa.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
    }

    location / {
        if ($query_string != "") {
            return 301 http://lavozsalsa.com$uri;
        }

        try_files $uri $uri/ /index.html;
    }

    location /_expo/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
